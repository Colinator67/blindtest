<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Blindtest</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎵 Blindtest du jour</h1>

<div class="player">

<button id="playButton">▶️ Play</button>
<button id="pauseButton">⏸ Pause</button>
<button id="nextSong">⏭ Musique suivante</button>

<div id="player"></div>

</div>

<div class="inputs">

<input id="guessTitle" placeholder="Titre">
<input id="guessArtist" placeholder="Artiste">

<button id="submit">Valider</button>

</div>

<button id="hintButton">💡 Indice</button>
<p id="hintText"></p>

<div id="result"></div>

<div id="songLink"></div>

<script src="script.js"></script>

</body>
</html>

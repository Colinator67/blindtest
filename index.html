<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blindtest quotidien</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎵 Blindtest du jour</h1>

<div id="player"></div>

<div class="controls">
<button id="playButton">▶ Play</button>
<button id="pauseButton">⏸ Pause</button>
<button id="nextSong">⏭ Musique suivante</button>
</div>

<div class="progressContainer">
<div id="progressBar"></div>
</div>

<div id="timer">⏱ Temps écoulé : 0.00s</div>

<div id="artistInputs"></div>

<button id="submit">Valider</button>

<h3>Indices</h3>

<button id="titleHintButton">Indice sur le titre</button>
<div id="titleHints"></div>

<button id="artistHintButton">Indice sur l'artiste</button>
<div id="artistHints"></div>

<div id="result"></div>

<div id="songLink"></div>

<div id="anecdote"></div>

<script src="script.js"></script>

</body>
</html>

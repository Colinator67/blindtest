<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blindtest quotidien</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎵 Blindtest du jour</h1>

<div class="player">

<button id="playButton">▶️ Jouer l'extrait</button>

<div id="player"></div>

</div>

<div class="inputs">

<input id="guessTitle" placeholder="Titre">
<input id="guessArtist" placeholder="Artiste">

<button id="submit">Valider</button>

</div>

<div id="result"></div>

<button id="hintButton">💡 Indice</button>
<p id="hintText"></p>

<div id="score"></div>

<button id="share">Partager résultat</button>

<script src="script.js"></script>

</body>
</html>

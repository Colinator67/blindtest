<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Blindtest brossage de dent</title>
<link rel="icon" type="image/png" href="auri.png">
<style>

body{
font-family:Arial;
text-align:center;
margin:30px;
}

input{
display:block;
margin:8px auto;
padding:8px;
font-size:16px;
}

button{
margin:5px;
padding:8px 12px;
font-size:16px;
}

.correct{
background:#b6ffb6;
}

.wrong{
background:#ffb6b6;
}

#progressContainer{
width:80%;
height:10px;
background:#ddd;
margin:20px auto;
}

#progressBar{
height:100%;
width:0%;
background:#4caf50;
}

</style>

</head>

<body>

<h1>Blindtest brossage de dents 🎵</h1>

<div id="timer">⏱ Temps : 0.00s</div>

<div id="player"></div>

<p id="anecdote"></p>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<button id="playButton">▶️ Play</button>
<button id="pauseButton">⏸ Pause</button>
<button id="nextSong">⏭ Musique suivante</button>

<h3>Alors ? :) Tu trouves ?</h3>

<div id="artistInputs"></div>

<button id="submit">Valider</button>
<button id="giveUp">Je donne ma langue au chat</button>

<h3>Indices</h3>

<button id="titleHintButton">Indice titre</button>
<button id="artistHintButton">Indice artiste</button>

<div id="titleHints"></div>
<div id="artistHints"></div>

<h3 id="result"></h3>

<div id="songLink"></div>

<p id="anecdote"></p>

<script src="script.js" defer></script>

</body>
</html>
